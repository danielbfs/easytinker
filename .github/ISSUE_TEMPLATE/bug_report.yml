name: Bug Report
description: Report a bug or unexpected behavior / Reportar um bug ou comportamento inesperado
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **EN:** Thanks for taking the time to report a bug! Please fill out the form below.
        **PT:** Obrigado por reportar o bug! Por favor, preencha o formulário abaixo.

  - type: textarea
    id: description
    attributes:
      label: "Description / Descrição"
      description: "A clear and concise description of the bug. / Uma descrição clara e concisa do bug."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce / Passos para Reproduzir"
      description: "Step-by-step instructions to reproduce the behavior. / Instruções passo a passo para reproduzir o comportamento."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior / Comportamento Esperado"
      description: "What did you expect to happen? / O que você esperava que acontecesse?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior / Comportamento Observado"
      description: "What actually happened? Include error messages and logs. / O que aconteceu de fato? Inclua mensagens de erro e logs."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment / Ambiente"
      description: "Please provide your environment details."
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker version: 27.x
        - Browser: Chrome 124
        - EaseTinker version / commit: main @ abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs / Logs Relevantes"
      description: "Paste any relevant logs here (`docker compose logs -f app`). / Cole logs relevantes aqui."
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: "I have searched existing issues and this is not a duplicate. / Pesquisei as issues existentes e isso não é uma duplicata."
          required: true
