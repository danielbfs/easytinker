name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /docker/easetinker

            echo "Pulling latest code..."
            git pull origin main

            echo "Writing .env..."
            cat > .env <<EOF
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            NEXTAUTH_URL=https://${{ secrets.APP_DOMAIN }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            POSTGRES_USER=easetinker
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=easetinker
            DATABASE_URL=postgresql://easetinker:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/easetinker
            REDIS_URL=redis://redis:6379
            WORKER_URL=http://worker:8000
            WORKER_SECRET=${{ secrets.WORKER_SECRET }}
            NODE_ENV=production
            EOF

            echo "Building and restarting services..."
            docker compose pull || true
            docker compose build --no-cache
            docker compose up -d --force-recreate

            echo "Running migrations..."
            docker compose exec -T app node node_modules/prisma/build/index.js migrate deploy

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deploy complete!"
